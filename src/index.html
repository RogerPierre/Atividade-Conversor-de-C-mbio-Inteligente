<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>convertor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1 class="wellcome">
            wellcome to convertor tax
        </h1>
        <h3>
            created by Roger
        </h3>
    </header>
    <section id='content'>
        <div class="form">
            <input type="number" placeholder="Type a value in Brazilian real" id="typeAREA">
        </div>
        <div id="GRID-container-money">
            <div class="moneyOutput" id="Output-dollar">
                <h2 class='money-name' >DOLLAR</h2>
                <p class="value-output">
                    U$0.00
                </p>
            </div>
            <div class="moneyOutput" id="Output-eur">
                <h2 class='money-name'>EURO</h2>
                <p class="value-output">
                    EU$0.00
                </p>
            </div>
            <div class="moneyOutput" id="Output-BTC">
                <h2 class='money-name'>BITCOIN</h2>
                <p class="value-output">
                    BTC$0.00
                </p>
            </div>
        </div>
    </section>
    <script type="module" src="./index.ts"></script>
</body>
</html>
